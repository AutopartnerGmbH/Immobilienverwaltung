<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immobilienverwaltung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#F5F3EC;
    --surface:#FFFFFF;
    --surface-2:#FBFAF6;
    --ink:#20281F;
    --ink-soft:#4A5245;
    --muted:#8A8577;
    --primary:#2C4A3E;
    --primary-light:#3F6656;
    --primary-dim:#E4EAE5;
    --accent:#A8763E;
    --accent-dim:#F1E6D5;
    --border:#DEDACC;
    --border-soft:#EAE7DC;
    --danger:#B33A3A;
    --danger-dim:#F6E3E1;
    --warn:#B8862E;
    --warn-dim:#F7ECD8;
    --success:#3F7A52;
    --success-dim:#E4EFE6;
    --radius:10px;
    --shadow:0 1px 2px rgba(32,40,31,0.06), 0 4px 16px rgba(32,40,31,0.05);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.5;}
  h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:600;margin:0;color:var(--ink);}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}

  /* ---------- Layout ---------- */
  #app{display:flex;min-height:100vh;}
  #sidebar{
    width:230px;flex-shrink:0;background:var(--primary);color:#EDF1EC;
    display:flex;flex-direction:column;padding:22px 0;
  }
  #sidebar .brand{padding:0 22px 20px 22px;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:14px;}
  #sidebar .brand .mark{font-family:'Fraunces',serif;font-size:20px;font-weight:600;letter-spacing:0.2px;}
  #sidebar .brand .sub{font-size:11px;color:#B9C6BE;margin-top:3px;letter-spacing:0.4px;text-transform:uppercase;}
  .navitem{
    display:flex;align-items:center;gap:10px;padding:10px 22px;cursor:pointer;
    color:#CFDACF;font-size:13.5px;border-left:3px solid transparent;transition:all .12s;
  }
  .navitem:hover{background:rgba(255,255,255,0.06);color:#fff;}
  .navitem.active{background:rgba(255,255,255,0.09);color:#fff;border-left-color:var(--accent);font-weight:500;}
  .navitem .n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8FA294;width:16px;}
  .navitem.active .n{color:var(--accent);}

  #main{flex:1;padding:32px 40px;max-width:1280px;}
  .pagehead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .pagehead h1{font-size:26px;}
  .pagehead .desc{color:var(--muted);font-size:13px;margin-top:4px;}

  /* ---------- Buttons ---------- */
  button{font-family:inherit;font-size:13.5px;cursor:pointer;border-radius:7px;border:1px solid transparent;padding:9px 16px;transition:all .12s;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-light);}
  .btn-outline{background:var(--surface);border-color:var(--border);color:var(--ink);}
  .btn-outline:hover{border-color:var(--primary);color:var(--primary);}
  .btn-ghost{background:transparent;color:var(--ink-soft);padding:6px 10px;}
  .btn-ghost:hover{background:var(--border-soft);}
  .btn-danger{background:transparent;color:var(--danger);padding:6px 10px;}
  .btn-danger:hover{background:var(--danger-dim);}
  .btn-sm{padding:5px 10px;font-size:12.5px;}

  /* ---------- Cards / tables ---------- */
  .card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);box-shadow:var(--shadow);}
  .card-pad{padding:20px 22px;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--border);}
  td{padding:12px 14px;border-bottom:1px solid var(--border-soft);font-size:13.5px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr.rowhover:hover{background:var(--surface-2);}
  .empty{padding:36px;text-align:center;color:var(--muted);}

  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;}
  .badge-ok{background:var(--success-dim);color:var(--success);}
  .badge-warn{background:var(--warn-dim);color:var(--warn);}
  .badge-danger{background:var(--danger-dim);color:var(--danger);}
  .badge-muted{background:var(--border-soft);color:var(--ink-soft);}

  /* index-tab styled object card (signature element) */
  .objekt-card{
    position:relative;background:var(--surface);border:1px solid var(--border-soft);border-radius:8px;
    padding:16px 18px 16px 22px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s, box-shadow .12s;
    border-left:4px solid var(--accent);
  }
  .objekt-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(32,40,31,0.10);}
  .objekt-card .idx{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
  .objekt-card h3{font-size:17px;margin-top:2px;}
  .objekt-card .addr{color:var(--muted);font-size:12.5px;margin-top:2px;}
  .objekt-card .stats{display:flex;gap:14px;margin-top:12px;font-size:12px;color:var(--ink-soft);}
  .objekt-card .stats b{color:var(--ink);font-weight:600;}

  .grid{display:grid;gap:16px;}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:1000px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr);}}

  .kpi{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
  .kpi .label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;}
  .kpi .value{font-family:'Fraunces',serif;font-size:28px;margin-top:6px;color:var(--ink);}
  .kpi .sub{font-size:12px;margin-top:4px;color:var(--ink-soft);}

  /* ---------- Forms ---------- */
  label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;font-weight:500;}
  input,select,textarea{
    width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13.5px;
    background:var(--surface);color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--primary-dim);border-color:var(--primary);}
  textarea{resize:vertical;min-height:60px;}
  .field{margin-bottom:14px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .checkrow{display:flex;align-items:center;gap:8px;}
  .checkrow input{width:auto;}

  /* ---------- Modal ---------- */
  #modal-overlay{
    display:none;position:fixed;inset:0;background:rgba(32,40,31,0.45);z-index:100;
    align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;
  }
  #modal-overlay.open{display:flex;}
  #modal-box{background:var(--surface);border-radius:12px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
  #modal-box .modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border-soft);}
  #modal-box .modal-head h3{font-size:18px;}
  #modal-box .modal-body{padding:22px;max-height:70vh;overflow-y:auto;}
  #modal-box .modal-foot{padding:16px 22px;border-top:1px solid var(--border-soft);display:flex;justify-content:flex-end;gap:10px;}
  .modal-close{background:none;border:none;font-size:20px;color:var(--muted);padding:2px 6px;}

  .tag-toggle{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1px solid var(--border-soft);border-radius:7px;margin-bottom:6px;}
  .tag-toggle .name{font-size:13px;}
  .tag-toggle select{width:150px;}

  .config-banner{background:var(--warn-dim);border:1px solid #E4CB8C;color:#7A5B18;padding:14px 18px;border-radius:8px;margin-bottom:20px;font-size:13px;}
  .config-banner code{background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px;}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:200;opacity:0;transform:translateY(8px);transition:all .2s;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.err{background:var(--danger);}

  .subnav{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .subnav button{background:var(--surface);border:1px solid var(--border-soft);color:var(--ink-soft);}
  .subnav button.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);font-weight:500;}

  .breadcrumb{font-size:12.5px;color:var(--muted);margin-bottom:8px;cursor:pointer;}
  .breadcrumb span:hover{color:var(--primary);}

  .section-title{font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:600;margin:22px 0 10px;}
  .section-title:first-child{margin-top:0;}

  .helptext{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .vorgang-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:8px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;}
  .vorgang-card:hover{border-color:var(--primary);}
  .prio-hoch{color:var(--danger);font-weight:600;}
  .prio-mittel{color:var(--warn);font-weight:600;}
  .prio-niedrig{color:var(--muted);}
  .checklist-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-soft);}
  .checklist-item.done .txt{text-decoration:line-through;color:var(--muted);}
  .checklist-item input{width:auto;}
  .dropzone{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;color:var(--muted);cursor:pointer;margin-bottom:18px;}
  .dropzone:hover{border-color:var(--primary);color:var(--primary);}
  .doc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border-soft);font-size:13.5px;}
  .doc-row:last-child{border-bottom:none;}
  .vorlage-item{padding:10px 12px;border:1px solid var(--border-soft);border-radius:7px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .vorlage-item:hover{border-color:var(--primary);background:var(--surface-2);}
  .ab-summary{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-soft);font-size:13.5px;}
  .ab-summary.total{font-weight:600;border-top:2px solid var(--ink);border-bottom:none;padding-top:12px;margin-top:4px;}
  .editable-amount{width:110px;text-align:right;padding:5px 8px;}
  @media print{
    .no-print{display:none !important;}
    #sidebar, .pagehead button, .pagehead select, .breadcrumb{display:none !important;}
    input.editable-amount{border:none;background:none;padding:0;-webkit-appearance:none;}
  }
</style>
</head>
<body>

<div id="app">
  <nav id="sidebar">
    <div class="brand">
      <div class="mark">Lückel Immobilien</div>
      <div class="sub">Hausverwaltung</div>
    </div>
    <div class="navitem active" data-page="dashboard"><span class="n">01</span> Dashboard</div>
    <div class="navitem" data-page="objekte"><span class="n">02</span> Objekte</div>
    <div class="navitem" data-page="mieter"><span class="n">03</span> Mieter &amp; Verträge</div>
    <div class="navitem" data-page="vorgaenge"><span class="n">04</span> Vorgänge</div>
    <div class="navitem" data-page="zaehler"><span class="n">05</span> Zähler</div>
    <div class="navitem" data-page="nebenkosten"><span class="n">06</span> Nebenkosten</div>
    <div class="navitem" data-page="zahlungen"><span class="n">07</span> Zahlungsabgleich</div>
    <div class="navitem" data-page="dokumente"><span class="n">08</span> Dokumente</div>
    <div class="navitem" data-page="berichte"><span class="n">09</span> Berichte</div>
    <div class="navitem" data-page="einstellungen"><span class="n">10</span> Einstellungen</div>
  </nav>
  <main id="main"></main>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <div class="modal-head"><h3 id="modal-title">Titel</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   KONFIGURATION
   Trage hier einmalig deine Supabase-Zugangsdaten ein.
   Projekt > Settings > API > "Project URL" und "anon public" Key
   ============================================================ */
const SUPABASE_URL = "https://adtamsdadhtsoyvphjax.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdGFtc2RhZGh0c295dnBoamF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTkyOTAsImV4cCI6MjA5Njk5NTI5MH0.H8XWreBTyL7WLYrpAWgl5A6CejM6sT-a244aEIVJgwk";

let sb = null;
let CONFIGURED = SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY.length > 20;
if (CONFIGURED) {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

/* ============================================================
   STATE
   ============================================================ */
let STATE = {
  page: 'dashboard',
  objekte: [],
  einheiten: [],
  mieter: [],
  vertraege: [],
  kostenarten: [],
  objektKostenarten: [],
  zaehler: [],
  zaehlerstaende: [],
  zahlungen: [],
  rechnungen: [],
  vorgaenge: [],
  vorgangTodos: [],
  dokumente: [],
  kommunikation: [],
  abrechnungen: [],
  abrechnungDetails: [],
  selectedObjektId: null,
  selectedVorgangId: null,
  selectedAbrechnungId: null,
  nebenkostenTab: 'abrechnungen',
  dokumenteObjektFilter: '',
  csvRows: null,
  csvMapping: {}
};

const EINHEIT_TYPEN = ['Wohnung','Garage','Werbetafel'];
const ZAEHLER_TYPEN = ['Heizung','Kaltwasser','Warmwasser','Strom','Sonstiges'];
const KOMM_TYPEN = ['Anruf','E-Mail','Brief','Persönlich','Sonstiges'];
const DOK_KATEGORIEN = ['Mietvertrag','Rechnung','Protokoll','Versicherung','Korrespondenz','Sonstiges'];

/* Vorgangs-Vorlagen: fertige Checklisten für wiederkehrende Aufgaben */
const VORGANG_VORLAGEN = [
  {titel:'Mieterwechsel vorbereiten', kategorie:'Mieterwechsel', todos:[
    'Kündigungsbestätigung an Mieter senden','Übergabetermin vereinbaren','Zählerstände bei Übergabe erfassen',
    'Wohnung auf Mängel prüfen','Kaution abrechnen','Neuinserat vorbereiten','Schlüsselübergabe dokumentieren']},
  {titel:'Mieterhöhung durchführen', kategorie:'Miete', todos:[
    'Ortsübliche Vergleichsmiete prüfen','Fristen prüfen (Sperrfrist, Kappungsgrenze)','Erhöhungsschreiben erstellen',
    'Schreiben versenden','Zustimmung/Fristablauf vermerken','Neue Miete ab Stichtag im Vertrag hinterlegen']},
  {titel:'Nebenkostenabrechnung erstellen', kategorie:'Nebenkosten', todos:[
    'Alle Rechnungen des Zeitraums erfassen','Zählerstände zum Stichtag ablesen','Verteilerschlüssel je Kostenart prüfen',
    'Abrechnung berechnen und prüfen','Abrechnung an Mieter versenden','Nachzahlungen/Guthaben verbuchen']},
  {titel:'Schadensmeldung bearbeiten', kategorie:'Instandhaltung', todos:[
    'Schaden aufnehmen und dokumentieren','Dringlichkeit einschätzen','Handwerker beauftragen',
    'Termin mit Mieter koordinieren','Rechnung prüfen und erfassen','Fall abschließen']},
  {titel:'Vertragsende prüfen', kategorie:'Vertrag', todos:[
    'Vertragsende im Kalender prüfen','Verlängerung oder Nachmieter klären','Kündigungsfristen beachten','Übergabetermin planen falls Auszug']},
  {titel:'Kautionsabrechnung nach Auszug', kategorie:'Kaution', todos:[
    'Übergabeprotokoll prüfen','Offene Forderungen gegenrechnen','Kautionsabrechnung erstellen','Restbetrag auszahlen','Abrechnung dokumentieren']},
  {titel:'Neues Objekt einpflegen', kategorie:'Onboarding', todos:[
    'Stammdaten erfassen','Einheiten anlegen','Zähler erfassen','Bestehende Verträge übertragen',
    'Kostenarten für Objekt festlegen','Dokumente hochladen']},
  {titel:'Zahlungsrückstand klären', kategorie:'Mahnwesen', todos:[
    'Rückstand prüfen','Erste Zahlungserinnerung senden','Kontakt zum Mieter aufnehmen',
    'Ratenzahlung anbieten falls sinnvoll','Mahnung erstellen falls keine Reaktion','Fall dokumentieren']}
];

/* ============================================================
   INIT / DATA LOADING
   ============================================================ */
async function loadAll(){
  if(!CONFIGURED) return renderPage();
  try{
    const [ob, ei, mi, ve, ka, ok, za, zs, zh, re, vo, vt, dk, km, ab, ad] = await Promise.all([
      sb.from('objekte').select('*').order('name'),
      sb.from('einheiten').select('*').order('bezeichnung'),
      sb.from('mieter').select('*').order('nachname'),
      sb.from('vertraege').select('*').order('beginn_datum', {ascending:false}),
      sb.from('kostenarten').select('*').order('sortierung'),
      sb.from('objekt_kostenarten').select('*'),
      sb.from('zaehler').select('*'),
      sb.from('zaehlerstaende').select('*').order('datum',{ascending:false}),
      sb.from('zahlungen').select('*').order('datum',{ascending:false}),
      sb.from('rechnungen').select('*').order('rechnungsdatum',{ascending:false}),
      sb.from('vorgaenge').select('*').order('erstellt_am',{ascending:false}),
      sb.from('vorgang_todos').select('*').order('reihenfolge'),
      sb.from('dokumente').select('*').order('hochgeladen_am',{ascending:false}),
      sb.from('kommunikation').select('*').order('datum',{ascending:false}),
      sb.from('abrechnungen').select('*').order('erstellt_am',{ascending:false}),
      sb.from('abrechnung_details').select('*'),
    ]);
    STATE.objekte = ob.data||[];
    STATE.einheiten = ei.data||[];
    STATE.mieter = mi.data||[];
    STATE.vertraege = ve.data||[];
    STATE.kostenarten = ka.data||[];
    STATE.objektKostenarten = ok.data||[];
    STATE.zaehler = za.data||[];
    STATE.zaehlerstaende = zs.data||[];
    STATE.zahlungen = zh.data||[];
    STATE.rechnungen = re.data||[];
    STATE.vorgaenge = vo.data||[];
    STATE.vorgangTodos = vt.data||[];
    STATE.dokumente = dk.data||[];
    STATE.kommunikation = km.data||[];
    STATE.abrechnungen = ab.data||[];
    STATE.abrechnungDetails = ad.data||[];
  }catch(e){
    showToast('Fehler beim Laden: '+e.message, true);
  }
  renderPage();
}

function go(page){
  STATE.page = page;
  document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active', n.dataset.page===page));
  renderPage();
}
document.querySelectorAll('.navitem').forEach(n=>n.addEventListener('click', ()=>go(n.dataset.page)));

/* ============================================================
   HELPERS
   ============================================================ */
function fmtMoney(n){ return (n==null?0:Number(n)).toLocaleString('de-DE',{style:'currency',currency:'EUR'}); }
function fmtDate(d){ if(!d) return '–'; const [y,m,day]=d.split('-'); return `${day}.${m}.${y}`; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function uid(){ return 'id'+Math.random().toString(36).slice(2,9); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr?' err':'');
  setTimeout(()=>t.classList.remove('show'), 3200);
}

function objektName(id){ const o=STATE.objekte.find(x=>x.id===id); return o?o.name:'–'; }
function einheitLabel(id){ const e=STATE.einheiten.find(x=>x.id===id); if(!e) return '–'; return `${e.bezeichnung} · ${objektName(e.objekt_id)}`; }
function mieterName(id){ const m=STATE.mieter.find(x=>x.id===id); if(!m) return '–'; return m.firma || `${m.vorname||''} ${m.nachname||''}`.trim(); }
function aktiveVertraege(){ return STATE.vertraege.filter(v=>v.status==='aktiv'); }
function vertragFuerEinheit(einheitId){ return STATE.vertraege.find(v=>v.einheit_id===einheitId && v.status==='aktiv'); }

async function dbInsert(table, obj){
  const {data, error} = await sb.from(table).insert(obj).select();
  if(error){ showToast('Fehler: '+error.message, true); throw error; }
  return data[0];
}
async function dbUpdate(table, id, obj){
  const {error} = await sb.from(table).update(obj).eq('id', id);
  if(error){ showToast('Fehler: '+error.message, true); throw error; }
}
async function dbDelete(table, id){
  const {error} = await sb.from(table).delete().eq('id', id);
  if(error){ showToast('Fehler: '+error.message, true); throw error; }
}

/* ============================================================
   MODAL
   ============================================================ */
function openModal(title, bodyHtml, footHtml){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-foot').innerHTML = footHtml;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e=>{ if(e.target.id==='modal-overlay') closeModal(); });

/* ============================================================
   RENDER ROOT
   ============================================================ */
function renderPage(){
  const main = document.getElementById('main');
  if(!CONFIGURED){
    main.innerHTML = renderConfigNotice();
    return;
  }
  switch(STATE.page){
    case 'dashboard': main.innerHTML = renderDashboard(); break;
    case 'objekte': main.innerHTML = renderObjekte(); break;
    case 'mieter': main.innerHTML = renderMieter(); break;
    case 'vorgaenge': main.innerHTML = renderVorgaenge(); break;
    case 'zaehler': main.innerHTML = renderZaehler(); break;
    case 'nebenkosten': main.innerHTML = renderNebenkosten(); break;
    case 'zahlungen': main.innerHTML = renderZahlungen(); break;
    case 'dokumente': main.innerHTML = renderDokumente(); break;
    case 'berichte': main.innerHTML = renderBerichte(); break;
    case 'einstellungen': main.innerHTML = renderEinstellungen(); break;
  }
}

function renderConfigNotice(){
  return `

    <ol style="line-height:2;">

      <li>Unter <b>Project Settings → API</b> die <b>Project URL</b> und den <b>anon public key</b> kopieren</li>

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDashboard(){
  const wohn = STATE.einheiten.filter(e=>e.typ==='Wohnung');
  const garagen = STATE.einheiten.filter(e=>e.typ==='Garage');
  const werbe = STATE.einheiten.filter(e=>e.typ==='Werbetafel');
  const vermietbar = STATE.einheiten.length;
  const belegt = aktiveVertraege().length;
  const quote = vermietbar? Math.round(belegt/vermietbar*100):0;

  const offeneZahlungen = STATE.zahlungen.filter(z=>z.status==='offen');
  const offeneSumme = offeneZahlungen.reduce((s,z)=>s+Number(z.betrag||0),0);

  const heuteD = new Date();
  const in60 = new Date(); in60.setDate(in60.getDate()+60);
  const auslaufend = STATE.vertraege.filter(v=>v.status==='aktiv' && v.ende_datum && new Date(v.ende_datum)<=in60 && new Date(v.ende_datum)>=heuteD);

  const sollMieteGesamt = aktiveVertraege().reduce((s,v)=>s+Number(v.kaltmiete||0)+Number(v.nk_vorauszahlung||0),0);
  const offeneVorgaenge = STATE.vorgaenge.filter(v=>v.status!=='erledigt');

  return `
  <div class="pagehead">
    <div><h1>Dashboard</h1><div class="desc">Gesamtübersicht über alle Objekte, Einheiten und offenen Posten</div></div>
  </div>

  <div class="grid grid-4" style="margin-bottom:24px;">
    <div class="kpi"><div class="label">Objekte</div><div class="value">${STATE.objekte.length}</div><div class="sub">${wohn.length} Wohnungen · ${garagen.length} Garagen · ${werbe.length} Werbetafeln</div></div>
    <div class="kpi"><div class="label">Belegungsquote</div><div class="value">${quote}%</div><div class="sub">${belegt} von ${vermietbar} Einheiten vermietet</div></div>
    <div class="kpi"><div class="label">Soll-Mieteinnahmen / Monat</div><div class="value">${fmtMoney(sollMieteGesamt)}</div><div class="sub">aus ${belegt} aktiven Verträgen</div></div>
    <div class="kpi"><div class="label">Offene Zahlungen</div><div class="value" style="color:${offeneZahlungen.length?'var(--danger)':'var(--ink)'}">${offeneZahlungen.length}</div><div class="sub">${fmtMoney(offeneSumme)} nicht zugeordnet</div></div>
  </div>

  <div class="grid" style="grid-template-columns:1.4fr 1fr; align-items:start;">
    <div class="card">
      <div class="card-pad" style="border-bottom:1px solid var(--border-soft);"><h3 style="font-size:15px;">Objekte im Überblick</h3></div>
      <table>
        <thead><tr><th>Objekt</th><th>Einheiten</th><th>Vermietet</th><th>Kaltmiete Soll</th></tr></thead>
        <tbody>
        ${STATE.objekte.length===0? `<tr><td colspan="4" class="empty">Noch keine Objekte angelegt</td></tr>` :
          STATE.objekte.map(o=>{
            const eh = STATE.einheiten.filter(e=>e.objekt_id===o.id);
            const akt = eh.filter(e=>vertragFuerEinheit(e.id));
            const soll = eh.reduce((s,e)=>{ const v=vertragFuerEinheit(e.id); return s+(v?Number(v.kaltmiete||0):0); },0);
            return `<tr class="rowhover">
              <td><b>${esc(o.name)}</b><div style="color:var(--muted);font-size:11.5px;">${esc(o.ort||'')}</div></td>
              <td>${eh.length}</td>
              <td>${akt.length}/${eh.length}</td>
              <td>${fmtMoney(soll)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-pad" style="border-bottom:1px solid var(--border-soft);"><h3 style="font-size:15px;">Bald auslaufende Verträge</h3></div>
      <div style="padding:6px 0;">
      ${auslaufend.length===0? `<div class="empty">Keine Verträge laufen in den nächsten 60 Tagen aus</div>` :
        auslaufend.map(v=>`
        <div style="padding:12px 22px;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;">
          <div><b>${esc(mieterName(v.mieter_id))}</b><div style="color:var(--muted);font-size:12px;">${esc(einheitLabel(v.einheit_id))}</div></div>
          <div class="badge badge-warn">bis ${fmtDate(v.ende_datum)}</div>
        </div>`).join('')}
      </div>
      <div class="card-pad" style="border-top:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);"><h3 style="font-size:15px;">Offene Vorgänge</h3></div>
      <div style="padding:6px 0;">
      ${offeneVorgaenge.length===0? `<div class="empty">Keine offenen Vorgänge</div>` :
        offeneVorgaenge.slice(0,6).map(v=>`
        <div class="rowhover" style="padding:10px 22px;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;cursor:pointer;" onclick="go('vorgaenge');">
          <span>${esc(v.titel)}</span>
          <span class="prio-${v.prioritaet}">${v.prioritaet}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

  return `

  </div>
  <div class="grid grid-3">
    ${STATE.objekte.length===0? `<div class="card"><div class="empty">Noch keine Objekte angelegt. Leg dein erstes Objekt an.</div></div>` :
      STATE.objekte.map((o,i)=>{
        const eh = STATE.einheiten.filter(e=>e.objekt_id===o.id);

        <div class="objekt-card" onclick="openObjektDetail('${o.id}')">

function openObjektDetail(id){ STATE.selectedObjektId = id; renderPage(); }

function renderObjektDetail(id){
  const o = STATE.objekte.find(x=>x.id===id);
  if(!o){ STATE.selectedObjektId=null; return renderObjekte(); }
  const eh = STATE.einheiten.filter(e=>e.objekt_id===id);
  const aktiveKa = STATE.objektKostenarten.filter(k=>k.objekt_id===id);

  return `
  <div class="breadcrumb"><span onclick="STATE.selectedObjektId=null; renderPage();">← Alle Objekte</span></div>
  <div class="pagehead">
    <div><h1>${esc(o.name)}</h1><div class="desc">${esc(o.strasse||'')}, ${esc(o.plz||'')} ${esc(o.ort||'')}</div></div>
    <div style="display:flex;gap:8px;">
      <button class="btn-outline" onclick="openObjektForm('${o.id}')">Bearbeiten</button>
      <button class="btn-danger" onclick="deleteObjekt('${o.id}')">Löschen</button>
    </div>
  </div>

  ${o.besonderheiten? `<div class="card card-pad" style="margin-bottom:20px;background:var(--accent-dim);border:none;"><b>Besonderheiten:</b> ${esc(o.besonderheiten)}</div>`:''}

  <div class="section-title">Einheiten (${eh.length})</div>
  <div class="card" style="margin-bottom:26px;">
    <table>
      <thead><tr><th>Typ</th><th>Bezeichnung</th><th>Fläche</th><th>Mieter</th><th>Kaltmiete</th><th></th></tr></thead>
      <tbody>
      ${eh.length===0? `<tr><td colspan="6" class="empty">Noch keine Einheiten. Leg Wohnungen/Garagen/Werbetafeln an.</td></tr>` :
        eh.map(e=>{
          const v = vertragFuerEinheit(e.id);
          return `<tr class="rowhover">
            <td><span class="badge badge-muted">${e.typ}</span></td>
            <td><b>${esc(e.bezeichnung)}</b></td>
            <td>${e.wohnflaeche_m2? e.wohnflaeche_m2+' m²':'–'}</td>
            <td>${v? esc(mieterName(v.mieter_id)) : '<span style="color:var(--muted);">frei</span>'}</td>
            <td>${v? fmtMoney(v.kaltmiete):'–'}</td>
            <td style="text-align:right;">
              <button class="btn-ghost btn-sm" onclick="openEinheitForm('${o.id}','${e.id}')">Bearbeiten</button>
              <button class="btn-danger btn-sm" onclick="deleteEinheit('${e.id}')">Löschen</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div style="padding:14px 18px;"><button class="btn-outline btn-sm" onclick="openEinheitForm('${o.id}')">+ Einheit hinzufügen</button></div>
  </div>

  <div class="section-title">Kostenarten für dieses Objekt</div>
  <div class="card card-pad">
    <div class="helptext" style="margin-bottom:12px;">Standardmäßig sind übliche Kostenarten aktiv. Hier kannst du einzelne deaktivieren oder den Verteilerschlüssel nur für dieses Objekt abweichend setzen.</div>
    ${STATE.kostenarten.map(k=>{
      const ok = aktiveKa.find(x=>x.kostenart_id===k.id);
      const aktiv = ok? ok.aktiv : true;
      const schluessel = ok?.verteilerschluessel_override || k.standard_verteilerschluessel;
      return `
      <div class="tag-toggle">
        <div class="checkrow">
          <input type="checkbox" ${aktiv?'checked':''} onchange="toggleKostenart('${o.id}','${k.id}', this.checked)">
          <span class="name">${esc(k.name)} ${k.ist_heizkosten?'<span class=\"badge badge-warn\" style=\"margin-left:6px;\">Heizkosten</span>':''}</span>
        </div>
        <select onchange="setSchluessel('${o.id}','${k.id}', this.value)">
          <option value="m2" ${schluessel==='m2'?'selected':''}>nach m²</option>
          <option value="personen" ${schluessel==='personen'?'selected':''}>nach Personen</option>
          <option value="verbrauch" ${schluessel==='verbrauch'?'selected':''}>nach Verbrauch</option>
          <option value="individuell" ${schluessel==='individuell'?'selected':''}>individuell</option>
        </select>
      </div>`;
    }).join('')}
  </div>`;
}

async function toggleKostenart(objektId, kostenartId, aktiv){
  const existing = STATE.objektKostenarten.find(x=>x.objekt_id===objektId && x.kostenart_id===kostenartId);
  if(existing){ await dbUpdate('objekt_kostenarten', existing.id, {aktiv}); existing.aktiv=aktiv; }
  else{ const row = await dbInsert('objekt_kostenarten', {objekt_id:objektId, kostenart_id:kostenartId, aktiv}); STATE.objektKostenarten.push(row); }
  showToast('Gespeichert');
}
async function setSchluessel(objektId, kostenartId, wert){
  const existing = STATE.objektKostenarten.find(x=>x.objekt_id===objektId && x.kostenart_id===kostenartId);
  if(existing){ await dbUpdate('objekt_kostenarten', existing.id, {verteilerschluessel_override:wert}); existing.verteilerschluessel_override=wert; }
  else{ const row = await dbInsert('objekt_kostenarten', {objekt_id:objektId, kostenart_id:kostenartId, aktiv:true, verteilerschluessel_override:wert}); STATE.objektKostenarten.push(row); }
  showToast('Gespeichert');
}

function openObjektForm(id){
  const o = id? STATE.objekte.find(x=>x.id===id) : {};
  const body = `
    <div class="field"><label>Name des Objekts</label><input id="f-name" value="${esc(o.name||'')}" placeholder="z.B. Mendener Str. 143"></div>
    <div class="field-row">

      <div class="field"><label>PLZ</label><input id="f-plz" value="${esc(o.plz||'')}"></div>
    </div>
    <div class="field"><label>Ort</label><input id="f-ort" value="${esc(o.ort||'')}"></div>
    <div class="field">
      <label>Heizkosten-Verteilung: Anteil nach Verbrauch (%)</label>
      <input id="f-hk" type="number" min="50" max="70" value="${o.heizkosten_verbrauch_anteil||70}">

    </div>
    <div class="field"><label>Besonderheiten / individuelle Absprachen für dieses Haus</label><textarea id="f-bes" placeholder="z.B. Garage wird pauschal mit abgerechnet, eigener Hausmeister-Vertrag...">${esc(o.besonderheiten||'')}</textarea></div>
  `;
  const foot = `<button class="btn-outline" onclick="closeModal()">Abbrechen</button><button class="btn-primary" onclick="saveObjekt('${id||''}')">Speichern</button>`;

async function saveObjekt(id){
  const obj = {
    name: document.getElementById('f-name').value.trim(),
    strasse: document.getElementById('f-strasse').value.trim(),
    plz: document.getElementById('f-plz').value.trim(),
    ort: document.getElementById('f-ort').value.trim(),
    heizkosten_verbrauch_anteil: Number(document.getElementById('f-hk').value)||70,
    besonderheiten: document.getElementById('f-bes').value.trim(),
  };
  if(!obj.name){ showToast('Bitte einen Namen eingeben', true); return; }
  if(id){ await dbUpdate('objekte', id, obj); Object.assign(STATE.objekte.find(x=>x.id===id), obj); }
  else{ const row = await dbInsert('objekte', obj); STATE.objekte.push(row); }
  closeModal(); showToast('Objekt gespeichert'); renderPage();
}
async function deleteObjekt(id){
  if(!confirm('Objekt wirklich löschen? Alle zugehörigen Einheiten, Verträge und Zähler werden ebenfalls gelöscht.')) return;
  await dbDelete('objekte', id);
  STATE.objekte = STATE.objekte.filter(x=>x.id!==id);
  STATE.einheiten = STATE.einheiten.filter(x=>x.objekt_id!==id);
  STATE.selectedObjektId = null;
  showToast('Objekt gelöscht'); renderPage();
}

function openEinheitForm(objektId, einheitId){
  const e = einheitId? STATE.einheiten.find(x=>x.id===einheitId) : {};
  const body = `
    <div class="field-row">
      <div class="field"><label>Typ</label>
        <select id="f-typ">${EINHEIT_TYPEN.map(t=>`<option value="${t}" ${e.typ===t?'selected':''}>${t}</option>`).join('')}</select>

      <div class="field"><label>Wohnfläche (m²)</label><input id="f-flaeche" type="number" step="0.1" value="${e.wohnflaeche_m2||''}"></div>
      <div class="field"><label>Zimmer</label><input id="f-zimmer" type="number" step="0.5" value="${e.zimmer||''}"></div>
      <div class="field"><label>Etage</label><input id="f-etage" value="${esc(e.etage||'')}"></div>
    </div>

async function saveEinheit(objektId, einheitId){
  const obj = {
    objekt_id: objektId,
    typ: document.getElementById('f-typ').value,
    bezeichnung: document.getElementById('f-bez').value.trim(),
    wohnflaeche_m2: document.getElementById('f-flaeche').value? Number(document.getElementById('f-flaeche').value): null,
    zimmer: document.getElementById('f-zimmer').value? Number(document.getElementById('f-zimmer').value): null,
    etage: document.getElementById('f-etage').value.trim(),
    notizen: document.getElementById('f-notiz').value.trim(),
  };
  if(!obj.bezeichnung){ showToast('Bitte eine Bezeichnung eingeben', true); return; }
  if(einheitId){ await dbUpdate('einheiten', einheitId, obj); Object.assign(STATE.einheiten.find(x=>x.id===einheitId), obj); }
  else{ const row = await dbInsert('einheiten', obj); STATE.einheiten.push(row); }
  closeModal(); showToast('Einheit gespeichert'); renderPage();
}
async function deleteEinheit(id){
  if(!confirm('Einheit wirklich löschen?')) return;
  await dbDelete('einheiten', id);
  STATE.einheiten = STATE.einheiten.filter(x=>x.id!==id);
  showToast('Einheit gelöscht'); renderPage();
}

async function saveMieter(id){

async function deleteMieter(id){

/* ============================================================
   VORGÄNGE
   ============================================================ */
function renderVorgaenge(){
  if(STATE.selectedVorgangId){ return renderVorgangDetail(STATE.selectedVorgangId); }
  const gruppen = {offen:[], in_arbeit:[], erledigt:[]};
  STATE.vorgaenge.forEach(v=>{ (gruppen[v.status]||gruppen.offen).push(v); });

  const spalte = (titel, key, badgeClass) => `
    <div class="card" style="flex:1;min-width:0;">
      <div class="card-pad" style="border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;">
        <h3 style="font-size:15px;">${titel}</h3><span class="badge ${badgeClass}">${gruppen[key].length}</span>
      </div>
      <div style="padding:12px;">
        ${gruppen[key].length===0? `<div class="empty" style="padding:20px;">Keine Vorgänge</div>` :
          gruppen[key].map(v=>{
            const todos = STATE.vorgangTodos.filter(t=>t.vorgang_id===v.id);
            const done = todos.filter(t=>t.erledigt).length;
            return `
            <div class="vorgang-card" onclick="openVorgangDetail('${v.id}')">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                <b>${esc(v.titel)}</b>
                <span class="prio-${v.prioritaet}">${v.prioritaet}</span>
              </div>
              <div style="color:var(--muted);font-size:12px;margin-top:4px;">
                ${v.kategorie?esc(v.kategorie)+' · ':''}${v.objekt_id?esc(objektName(v.objekt_id)):''}
              </div>
              ${todos.length? `<div class="helptext" style="margin-top:6px;">${done}/${todos.length} Schritte erledigt</div>`:''}
              ${v.faelligkeit? `<div class="helptext" style="margin-top:2px;">fällig ${fmtDate(v.faelligkeit)}</div>`:''}
            </div>`;
          }).join('')}
      </div>
    </div>`;

  return `
  <div class="pagehead">
    <div><h1>Vorgänge</h1><div class="desc">Aufgaben und Checklisten für wiederkehrende Abläufe</div></div>
    <div style="display:flex;gap:8px;">
      <button class="btn-outline" onclick="openVorlagenModal()">+ Aus Vorlage</button>
      <button class="btn-primary" onclick="openVorgangForm()">+ Neuer Vorgang</button>
    </div>
  </div>
  <div style="display:flex;gap:16px;align-items:flex-start;">
    ${spalte('Offen','offen','badge-muted')}
    ${spalte('In Arbeit','in_arbeit','badge-warn')}
    ${spalte('Erledigt','erledigt','badge-ok')}
  </div>
  `;
}

function openVorgangDetail(id){ STATE.selectedVorgangId = id; renderPage(); }

function renderVorgangDetail(id){
  const v = STATE.vorgaenge.find(x=>x.id===id);
  if(!v){ STATE.selectedVorgangId=null; return renderVorgaenge(); }
  const todos = STATE.vorgangTodos.filter(t=>t.vorgang_id===v.id).sort((a,b)=>(a.reihenfolge||0)-(b.reihenfolge||0));
  return `
  <div class="breadcrumb"><span onclick="STATE.selectedVorgangId=null; renderPage();">← Alle Vorgänge</span></div>
  <div class="pagehead">
    <div><h1>${esc(v.titel)}</h1><div class="desc">${v.kategorie?esc(v.kategorie)+' · ':''}${v.objekt_id?esc(objektName(v.objekt_id)):'kein Objekt zugeordnet'}</div></div>
    <div style="display:flex;gap:8px;">
      <button class="btn-outline" onclick="openVorgangForm('${v.id}')">Bearbeiten</button>
      <button class="btn-danger" onclick="deleteVorgang('${v.id}')">Löschen</button>
    </div>
  </div>
  <div class="grid" style="grid-template-columns:1fr 300px;align-items:start;">
    <div class="card card-pad">
      <div class="section-title">Checkliste</div>
      ${todos.length===0? `<div class="empty">Noch keine Schritte. Füge unten welche hinzu.</div>` :
        todos.map(t=>`
        <div class="checklist-item ${t.erledigt?'done':''}">
          <input type="checkbox" ${t.erledigt?'checked':''} onchange="toggleTodo('${t.id}', this.checked)">
          <span class="txt" style="flex:1;">${esc(t.text)}</span>
          <button class="btn-ghost btn-sm" onclick="deleteTodo('${t.id}')">×</button>
        </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:14px;">
        <input id="new-todo-text" placeholder="Neuer Schritt..." onkeydown="if(event.key==='Enter') addTodo('${v.id}')">
        <button class="btn-outline btn-sm" onclick="addTodo('${v.id}')">Hinzufügen</button>
      </div>
      ${v.notizen? `<div class="section-title">Notizen</div><div>${esc(v.notizen)}</div>`:''}
    </div>
    <div class="card card-pad">
      <div class="section-title">Details</div>
      <div style="font-size:13px;line-height:2;">
        <div><b>Status:</b> ${v.status.replace('_',' ')}</div>
        <div><b>Priorität:</b> <span class="prio-${v.prioritaet}">${v.prioritaet}</span></div>
        <div><b>Fällig:</b> ${v.faelligkeit?fmtDate(v.faelligkeit):'–'}</div>
        <div><b>Objekt:</b> ${v.objekt_id?esc(objektName(v.objekt_id)):'–'}</div>
      </div>
      <div class="field" style="margin-top:14px;">
        <label>Status ändern</label>
        <select onchange="setVorgangStatus('${v.id}', this.value)">
          <option value="offen" ${v.status==='offen'?'selected':''}>offen</option>
          <option value="in_arbeit" ${v.status==='in_arbeit'?'selected':''}>in Arbeit</option>
          <option value="erledigt" ${v.status==='erledigt'?'selected':''}>erledigt</option>
        </select>
      </div>
    </div>
  </div>`;
}

async function toggleTodo(id, erledigt){
  await dbUpdate('vorgang_todos', id, {erledigt});
  STATE.vorgangTodos.find(t=>t.id===id).erledigt = erledigt;
  renderPage();
}
async function addTodo(vorgangId){
  const input = document.getElementById('new-todo-text');
  const text = input.value.trim();
  if(!text) return;
  const maxOrder = Math.max(0, ...STATE.vorgangTodos.filter(t=>t.vorgang_id===vorgangId).map(t=>t.reihenfolge||0));
  const row = await dbInsert('vorgang_todos', {vorgang_id:vorgangId, text, erledigt:false, reihenfolge:maxOrder+1});
  STATE.vorgangTodos.push(row);
  renderPage();
}
async function deleteTodo(id){
  await dbDelete('vorgang_todos', id);
  STATE.vorgangTodos = STATE.vorgangTodos.filter(x=>x.id!==id);
  renderPage();
}
async function setVorgangStatus(id, status){
  await dbUpdate('vorgaenge', id, {status});
  STATE.vorgaenge.find(v=>v.id===id).status = status;
  showToast('Status aktualisiert'); renderPage();
}

function openVorgangForm(id){
  const v = id? STATE.vorgaenge.find(x=>x.id===id) : {};
  const objektOpts = `<option value="">– kein Objekt –</option>` + STATE.objekte.map(o=>`<option value="${o.id}" ${v.objekt_id===o.id?'selected':''}>${esc(o.name)}</option>`).join('');
  const body = `
    <div class="field"><label>Titel</label><input id="f-titel" value="${esc(v.titel||'')}"></div>
    <div class="field-row">
      <div class="field"><label>Kategorie</label><input id="f-kategorie" value="${esc(v.kategorie||'')}" placeholder="z.B. Instandhaltung"></div>
      <div class="field"><label>Objekt (optional)</label><select id="f-objekt-v">${objektOpts}</select></div>
    </div>
    <div class="field-row-3">
      <div class="field"><label>Priorität</label>
        <select id="f-prio">
          <option value="hoch" ${v.prioritaet==='hoch'?'selected':''}>hoch</option>
          <option value="mittel" ${!v.prioritaet||v.prioritaet==='mittel'?'selected':''}>mittel</option>
          <option value="niedrig" ${v.prioritaet==='niedrig'?'selected':''}>niedrig</option>
        </select>
      </div>
      <div class="field"><label>Status</label>
        <select id="f-status-v">
          <option value="offen" ${!v.status||v.status==='offen'?'selected':''}>offen</option>
          <option value="in_arbeit" ${v.status==='in_arbeit'?'selected':''}>in Arbeit</option>
          <option value="erledigt" ${v.status==='erledigt'?'selected':''}>erledigt</option>
        </select>
      </div>
      <div class="field"><label>Fällig am</label><input id="f-faellig" type="date" value="${v.faelligkeit||''}"></div>
    </div>
    <div class="field"><label>Notizen</label><textarea id="f-vnotiz">${esc(v.notizen||'')}</textarea></div>
  `;
  const foot = `<button class="btn-outline" onclick="closeModal()">Abbrechen</button><button class="btn-primary" onclick="saveVorgang('${id||''}')">Speichern</button>`;
  openModal(id?'Vorgang bearbeiten':'Neuer Vorgang', body, foot);
}
async function saveVorgang(id){
  const obj = {
    titel: document.getElementById('f-titel').value.trim(),
    kategorie: document.getElementById('f-kategorie').value.trim(),
    objekt_id: document.getElementById('f-objekt-v').value || null,
    prioritaet: document.getElementById('f-prio').value,
    status: document.getElementById('f-status-v').value,
    faelligkeit: document.getElementById('f-faellig').value || null,
    notizen: document.getElementById('f-vnotiz').value.trim(),
  };
  if(!obj.titel){ showToast('Bitte einen Titel eingeben', true); return; }
  if(id){ await dbUpdate('vorgaenge', id, obj); Object.assign(STATE.vorgaenge.find(x=>x.id===id), obj); }
  else{ const row = await dbInsert('vorgaenge', obj); STATE.vorgaenge.push(row); }
  closeModal(); showToast('Vorgang gespeichert'); renderPage();
}
async function deleteVorgang(id){
  if(!confirm('Vorgang inkl. Checkliste wirklich löschen?')) return;
  await dbDelete('vorgaenge', id);
  STATE.vorgaenge = STATE.vorgaenge.filter(x=>x.id!==id);
  STATE.vorgangTodos = STATE.vorgangTodos.filter(x=>x.vorgang_id!==id);
  STATE.selectedVorgangId = null;
  showToast('Vorgang gelöscht'); renderPage();
}

function openVorlagenModal(){
  const body = VORGANG_VORLAGEN.map((t,i)=>`
    <div class="vorlage-item" onclick="createFromVorlage(${i})">
      <div><b>${esc(t.titel)}</b><div class="helptext">${esc(t.kategorie)} · ${t.todos.length} Schritte</div></div>
      <span>→</span>
    </div>`).join('');
  openModal('Vorgang aus Vorlage erstellen', body, `<button class="btn-outline" onclick="closeModal()">Abbrechen</button>`);
}
async function createFromVorlage(index){
  const t = VORGANG_VORLAGEN[index];
  const vorgang = await dbInsert('vorgaenge', {titel:t.titel, kategorie:t.kategorie, prioritaet:'mittel', status:'offen'});
  STATE.vorgaenge.unshift(vorgang);
  for(let i=0;i<t.todos.length;i++){
    const row = await dbInsert('vorgang_todos', {vorgang_id:vorgang.id, text:t.todos[i], erledigt:false, reihenfolge:i});
    STATE.vorgangTodos.push(row);
  }
  closeModal(); showToast('Vorgang aus Vorlage erstellt');
  STATE.selectedVorgangId = vorgang.id;
  go('vorgaenge');
}

   ZÄHLER
   ============================================================ */
function renderZaehler(){
  return `
  <div class="pagehead">
    <div><h1>Zähler</h1><div class="desc">Zählernummern je Objekt/Einheit, mit Ablesehistorie für die spätere Verbrauchsabrechnung</div></div>
    <button class="btn-primary" onclick="openZaehlerForm()">+ Zähler anlegen</button>
  </div>
  ${STATE.objekte.length===0? `<div class="card"><div class="empty">Erst ein Objekt anlegen</div></div>` :
    STATE.objekte.map(o=>{
      const zl = STATE.zaehler.filter(z=>z.objekt_id===o.id);
      if(zl.length===0 && STATE.objekte.length>1) return '';
      return `
      <div class="section-title">${esc(o.name)}</div>
      <div class="card" style="margin-bottom:22px;">
        <table>
          <thead><tr><th>Typ</th><th>Zählernummer</th><th>Zuordnung</th><th>Standort</th><th>Letzter Stand</th><th></th></tr></thead>
          <tbody>
          ${zl.length===0? `<tr><td colspan="6" class="empty">Noch keine Zähler für dieses Objekt</td></tr>` :
            zl.map(z=>{
              const staende = STATE.zaehlerstaende.filter(s=>s.zaehler_id===z.id).sort((a,b)=>b.datum.localeCompare(a.datum));
              const letzter = staende[0];
              return `<tr class="rowhover">
                <td><span class="badge badge-muted">${z.typ}</span></td>
                <td class="mono">${esc(z.zaehlernummer)}</td>
                <td>${z.einheit_id? esc(einheitLabel(z.einheit_id)) : '<span style="color:var(--muted);">Allgemein (ganzes Objekt)</span>'}</td>
                <td>${esc(z.standort||'–')}</td>
                <td>${letzter? `${letzter.stand} <span style="color:var(--muted);">(${fmtDate(letzter.datum)})</span>`:'<span style="color:var(--muted);">keine Ablesung</span>'}</td>
                <td style="text-align:right;white-space:nowrap;">
                  <button class="btn-ghost btn-sm" onclick="openZaehlerstandForm('${z.id}')">+ Ablesung</button>
                  <button class="btn-ghost btn-sm" onclick="openZaehlerForm('${z.id}')">Bearbeiten</button>
                  <button class="btn-danger btn-sm" onclick="deleteZaehler('${z.id}')">Löschen</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
    }).join('')}
  `;
}

function openZaehlerForm(id){
  const z = id? STATE.zaehler.find(x=>x.id===id) : {};
  const objektOpts = STATE.objekte.map(o=>`<option value="${o.id}" ${z.objekt_id===o.id?'selected':''}>${esc(o.name)}</option>`).join('');
  const body = `
    <div class="field"><label>Objekt</label><select id="f-objekt" onchange="refreshEinheitOptions()">${objektOpts}</select></div>
    <div class="field"><label>Einheit (leer lassen bei Allgemeinzähler fürs ganze Haus)</label>
      <select id="f-einheit-z"><option value="">– Allgemeinzähler –</option></select>
    </div>
    <div class="field-row">
      <div class="field"><label>Zählertyp</label><select id="f-ztyp">${ZAEHLER_TYPEN.map(t=>`<option value="${t}" ${z.typ===t?'selected':''}>${t}</option>`).join('')}</select></div>
      <div class="field"><label>Zählernummer</label><input id="f-znr" class="mono" value="${esc(z.zaehlernummer||'')}" placeholder="z.B. 0012345678"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Standort</label><input id="f-standort" value="${esc(z.standort||'')}" placeholder="z.B. Keller, Flur"></div>
      <div class="field"><label>Einbaudatum</label><input id="f-einbau" type="date" value="${z.einbaudatum||''}"></div>
    </div>
    <div class="field"><label>Notizen</label><textarea id="f-znotiz">${esc(z.notizen||'')}</textarea></div>
  `;
  const foot = `<button class="btn-outline" onclick="closeModal()">Abbrechen</button><button class="btn-primary" onclick="saveZaehler('${id||''}')">Speichern</button>`;
  openModal(id?'Zähler bearbeiten':'Neuer Zähler', body, foot);
  refreshEinheitOptions(z.einheit_id);
}
function refreshEinheitOptions(selected){
  const objektId = document.getElementById('f-objekt').value;
  const sel = document.getElementById('f-einheit-z');
  const eh = STATE.einheiten.filter(e=>e.objekt_id===objektId);
  sel.innerHTML = '<option value="">– Allgemeinzähler –</option>' + eh.map(e=>`<option value="${e.id}" ${selected===e.id?'selected':''}>${esc(e.bezeichnung)}</option>`).join('');
}
async function saveZaehler(id){
  const obj = {
    objekt_id: document.getElementById('f-objekt').value,
    einheit_id: document.getElementById('f-einheit-z').value || null,
    typ: document.getElementById('f-ztyp').value,

/* ============================================================
   NEBENKOSTEN
   ============================================================ */
function round2(n){ return Math.round(n*100)/100; }

function overlapDays(vStart, vEnd, pStart, pEnd){
  const s = new Date(Math.max(new Date(vStart), new Date(pStart)));
  const eV = vEnd? new Date(vEnd) : new Date(pEnd);
  const e = new Date(Math.min(eV.getTime(), new Date(pEnd).getTime()));
  if(e<s) return 0;
  return Math.round((e-s)/(1000*60*60*24))+1;
}

function kostenartZaehlerTyp(name){
  const n = (name||'').toLowerCase();
  if(n.includes('heizung')) return 'Heizung';
  if(n.includes('warmwasser')) return 'Warmwasser';
  if(n.includes('kaltwasser')) return 'Kaltwasser';
  if(n.includes('wasser')) return 'Kaltwasser';
  if(n.includes('strom')) return 'Strom';
  return null;
}

function einheitVerbrauch(einheitId, typ, von, bis){
  const zl = STATE.zaehler.filter(z=>z.einheit_id===einheitId && z.typ===typ);
  if(zl.length===0) return null;
  let total = 0, any=false;
  for(const z of zl){
    const staende = STATE.zaehlerstaende.filter(s=>s.zaehler_id===z.id).sort((a,b)=>a.datum.localeCompare(b.datum));
    const vor = [...staende].reverse().find(s=>s.datum<=von);
    const nachKandidaten = staende.filter(s=>s.datum<=bis);
    const nach = nachKandidaten.length? nachKandidaten[nachKandidaten.length-1] : null;
    if(vor && nach && nach.stand>=vor.stand){ total += (nach.stand-vor.stand); any=true; }
    else if(nach && !vor){ total += nach.stand; any=true; }
  }
  return any? total : null;
}

async function generateAbrechnung(objektId, von, bis){
  if(!objektId || !von || !bis){ showToast('Bitte Objekt und Zeitraum wählen', true); return; }
  const objekt = STATE.objekte.find(o=>o.id===objektId);
  const einheitenObjekt = STATE.einheiten.filter(e=>e.objekt_id===objektId && e.typ==='Wohnung');
  const gesamtTageZeitraum = Math.round((new Date(bis)-new Date(von))/86400000)+1;

  let anteile = [];
  for(const e of einheitenObjekt){
    const vertraegeEinheit = STATE.vertraege.filter(v=>v.einheit_id===e.id);
    for(const v of vertraegeEinheit){
      const tage = overlapDays(v.beginn_datum, v.ende_datum, von, bis);
      if(tage>0) anteile.push({vertrag:v, einheit:e, tage});
    }
  }
  if(anteile.length===0){ showToast('Keine Verträge im gewählten Zeitraum für dieses Objekt gefunden', true); return; }

  // Wichtig: Nenner läuft über ALLE Wohnungen des Objekts über den vollen Zeitraum – nicht nur über die
  // vermieteten Tage. So bleibt der Kostenanteil für Leerstand beim Vermieter, statt auf die Mieter verteilt zu werden.
  const gesamtM2TageGesamt = einheitenObjekt.reduce((s,e)=>s+(Number(e.wohnflaeche_m2||0)*gesamtTageZeitraum),0);

  const personenzahlWerte = anteile.map(a=>Number(a.vertrag.personenzahl||1));
  const durchschnittPersonen = personenzahlWerte.length? personenzahlWerte.reduce((s,p)=>s+p,0)/personenzahlWerte.length : 1;
  const gesamtPersonenTageGesamt = einheitenObjekt.reduce((s,e)=>{
    const occ = anteile.filter(a=>a.einheit.id===e.id);
    const occTage = occ.reduce((ss,a)=>ss+a.tage,0);
    const occPersonenTage = occ.reduce((ss,a)=>ss+(Number(a.vertrag.personenzahl||1)*a.tage),0);
    const gapTage = Math.max(0, gesamtTageZeitraum-occTage);
    return s + occPersonenTage + gapTage*durchschnittPersonen;
  },0);

  const aktiveKa = STATE.kostenarten.filter(k=>{
    const ok = STATE.objektKostenarten.find(x=>x.objekt_id===objektId && x.kostenart_id===k.id);
    return ok? ok.aktiv : true;
  });

  const abrechnung = await dbInsert('abrechnungen', {objekt_id:objektId, zeitraum_von:von, zeitraum_bis:bis, status:'entwurf'});
  STATE.abrechnungen.unshift(abrechnung);

  const neueDetails = [];
  const warnungen = [];
  const gesamtBetragProKostenart = {};
  const m2Anteil = (a)=> gesamtM2TageGesamt>0? (Number(a.einheit.wohnflaeche_m2||0)*a.tage)/gesamtM2TageGesamt : 1/anteile.length;
  const personenAnteil = (a)=> gesamtPersonenTageGesamt>0? (Number(a.vertrag.personenzahl||1)*a.tage)/gesamtPersonenTageGesamt : 1/anteile.length;

  for(const k of aktiveKa){
    const ok = STATE.objektKostenarten.find(x=>x.objekt_id===objektId && x.kostenart_id===k.id);
    const schluessel = ok?.verteilerschluessel_override || k.standard_verteilerschluessel;
    const rechnungenKa = STATE.rechnungen.filter(r=>r.objekt_id===objektId && r.kostenart_id===k.id && r.umlagefaehig!==false &&
      r.leistungszeitraum_von && r.leistungszeitraum_bis && r.leistungszeitraum_von<=bis && r.leistungszeitraum_bis>=von);
    const gesamtBetrag = rechnungenKa.reduce((s,r)=>s+Number(r.betrag||0),0);
    gesamtBetragProKostenart[k.id] = gesamtBetrag;
    if(gesamtBetrag<=0) continue;

    if(k.ist_heizkosten){
      const verbrauchAnteil = (objekt.heizkosten_verbrauch_anteil||70)/100;
      const flaechenAnteil = 1-verbrauchAnteil;
      const betragVerbrauch = gesamtBetrag*verbrauchAnteil;
      const betragFlaeche = gesamtBetrag*flaechenAnteil;
      const zTyp = kostenartZaehlerTyp(k.name) || 'Heizung';
      const verbraeuche = anteile.map(a=>({a, v: einheitVerbrauch(a.einheit.id, zTyp, von, bis)}));
      const gesamtVerbrauch = verbraeuche.reduce((s,x)=>s+(x.v||0),0);
      for(const {a,v} of verbraeuche){
        let betrag = 0, beschr;
        if(gesamtVerbrauch>0 && v!=null){ betrag += betragVerbrauch*(v/gesamtVerbrauch); beschr = `${v} Verbrauchseinh.`; }
        else { betrag += betragVerbrauch*m2Anteil(a); beschr = 'kein Zähler erfasst, nach Fläche'; warnungen.push(`${a.einheit.bezeichnung}: keine Zählerablesung für "${k.name}" im Zeitraum gefunden – Kosten wurden ersatzweise nach Fläche verteilt.`); }
        betrag += betragFlaeche*m2Anteil(a);
        neueDetails.push({abrechnung_id:abrechnung.id, vertrag_id:a.vertrag.id, kostenart_id:k.id, betrag:round2(betrag),
          anteil_beschreibung:`${beschr} (${objekt.heizkosten_verbrauch_anteil}% Verbr. / ${100-objekt.heizkosten_verbrauch_anteil}% Fläche)`, ist_vorauszahlung:false, ist_ergebnis_zeile:false});
      }
    } else if(schluessel==='personen'){
      for(const a of anteile){
        neueDetails.push({abrechnung_id:abrechnung.id, vertrag_id:a.vertrag.id, kostenart_id:k.id, betrag:round2(gesamtBetrag*personenAnteil(a)),
          anteil_beschreibung:`${a.vertrag.personenzahl||1} Pers. · ${a.tage} Tage`, ist_vorauszahlung:false, ist_ergebnis_zeile:false});
      }
    } else if(schluessel==='verbrauch'){
      const zTyp = kostenartZaehlerTyp(k.name);
      const verbraeuche = anteile.map(a=>({a, v: zTyp? einheitVerbrauch(a.einheit.id, zTyp, von, bis): null}));
      const gesamtVerbrauch = verbraeuche.reduce((s,x)=>s+(x.v||0),0);
      for(const {a,v} of verbraeuche){
        let betrag, beschr;
        if(gesamtVerbrauch>0 && v!=null){ betrag = gesamtBetrag*(v/gesamtVerbrauch); beschr = `${v} Verbrauchseinh.`; }
        else { betrag = gesamtBetrag*m2Anteil(a); beschr = 'kein Zähler erfasst, nach Fläche'; warnungen.push(`${a.einheit.bezeichnung}: keine Zählerablesung für "${k.name}" im Zeitraum gefunden – Kosten wurden ersatzweise nach Fläche verteilt.`); }
        neueDetails.push({abrechnung_id:abrechnung.id, vertrag_id:a.vertrag.id, kostenart_id:k.id, betrag:round2(betrag),
          anteil_beschreibung:beschr, ist_vorauszahlung:false, ist_ergebnis_zeile:false});
      }
    } else if(schluessel==='individuell'){
      // Ohne klaren Schlüssel: Verteilung nach Nutzungstagen der Einheit im Zeitraum (fairer als pauschal nach Fläche, z.B. bei einmaligen Reparaturen)
      const gesamtTage = anteile.reduce((s,a)=>s+a.tage,0);
      for(const a of anteile){
        const anteil = gesamtTage>0? a.tage/gesamtTage : 1/anteile.length;
        neueDetails.push({abrechnung_id:abrechnung.id, vertrag_id:a.vertrag.id, kostenart_id:k.id, betrag:round2(gesamtBetrag*anteil),
          anteil_beschreibung:`${a.tage} Nutzungstage · bitte prüfen/anpassen`, ist_vorauszahlung:false, ist_ergebnis_zeile:false});
      }
    } else { // m2 (Standard)
      for(const a of anteile){
        neueDetails.push({abrechnung_id:abrechnung.id, vertrag_id:a.vertrag.id, kostenart_id:k.id, betrag:round2(gesamtBetrag*m2Anteil(a)),
          anteil_beschreibung: `${a.einheit.wohnflaeche_m2||0} m² · ${a.tage} Tage`,
          ist_vorauszahlung:false, ist_ergebnis_zeile:false});
      }
    }
  }

  // Vorjahresvergleich als Plausibilitätscheck (nicht blockierend – nur Hinweis)
  const vorjahrAbrechnung = STATE.abrechnungen
    .filter(x=>x.objekt_id===objektId && x.id!==abrechnung.id && x.zeitraum_bis && x.zeitraum_bis<von)
    .sort((x,y)=>y.zeitraum_bis.localeCompare(x.zeitraum_bis))[0];
  if(vorjahrAbrechnung){
    for(const k of aktiveKa){
      const aktuell = gesamtBetragProKostenart[k.id]||0;
      const vorjahr = STATE.abrechnungDetails.filter(d=>d.abrechnung_id===vorjahrAbrechnung.id && d.kostenart_id===k.id && !d.ist_vorauszahlung).reduce((s,d)=>s+Number(d.betrag||0),0);
      if(vorjahr>0){
        const abweichung = (aktuell-vorjahr)/vorjahr;
        if(Math.abs(abweichung)>0.3){
          warnungen.push(`${k.name}: ${fmtMoney(aktuell)} in dieser Abrechnung vs. ${fmtMoney(vorjahr)} im Vorjahreszeitraum (${abweichung>0?'+':''}${Math.round(abweichung*100)}%) – bitte auf Plausibilität prüfen.`);
        }
      } else if(aktuell===0 && vorjahr===undefined){
        // keine Vorjahresdaten für diese Kostenart, kein Hinweis nötig
      }
    }
  }

  for(const a of anteile){
    const monate = a.tage/30.44;
    const vz = Number(a.vertrag.nk_vorauszahlung||0)*monate;
    neueDetails.push({abrechnung_id:abrechnung.id, vertrag_id:a.vertrag.id, kostenart_id:null, betrag:round2(-vz),
      anteil_beschreibung:`${monate.toFixed(1)} Monate NK-Vorauszahlung (Näherung)`, ist_vorauszahlung:true, ist_ergebnis_zeile:false});
  }

  for(const d of neueDetails){ d.berechneter_betrag = d.betrag; const row = await dbInsert('abrechnung_details', d); STATE.abrechnungDetails.push(row); }

  if(warnungen.length){
    await dbUpdate('abrechnungen', abrechnung.id, {warnungen});
    abrechnung.warnungen = warnungen;
  }

  // 12-Monats-Frist (§ 556 Abs. 3 BGB): Abrechnung muss dem Mieter fristgerecht zugehen
  const fristDatum = new Date(bis); fristDatum.setFullYear(fristDatum.getFullYear()+1);
  const fristVorgang = await dbInsert('vorgaenge', {
    titel: `Nebenkostenabrechnung ${objekt.name} (${fmtDate(von)}–${fmtDate(bis)}) versenden`,
    kategorie: 'Nebenkosten', objekt_id: objektId, prioritaet:'hoch', status:'offen',
    faelligkeit: fristDatum.toISOString().slice(0,10),
    notizen: 'Gesetzliche Frist: 12 Monate nach Ende des Abrechnungszeitraums (§ 556 Abs. 3 BGB). Danach sind Nachforderungen ausgeschlossen.'
  });
  STATE.vorgaenge.unshift(fristVorgang);

  closeModal();
  showToast('Abrechnung erstellt – bitte prüfen');
  STATE.selectedAbrechnungId = abrechnung.id;
  renderPage();
}

  const tab = STATE.nebenkostenTab || 'abrechnungen';
  return `
  <div class="pagehead">
    <div><h1>Nebenkosten</h1><div class="desc">Ausgaben erfassen und Nebenkostenabrechnungen erstellen</div></div>

  </div>
  <div class="subnav">
    <button class="${tab==='abrechnungen'?'active':''}" onclick="STATE.nebenkostenTab='abrechnungen'; renderPage();">Abrechnungen</button>

  return `

  <div class="card">
    <table>

  const body = `
    ${z? `<div class="helptext" style="margin-bottom:12px;">Aus Bankbuchung übernommen: ${fmtMoney(z.betrag)} am ${fmtDate(z.datum)} · ${esc(z.verwendungszweck||'')}</div>`:''}
    <div class="field-row">
      <div class="field"><label>Objekt</label><select id="f-r-objekt">${objOpts||'<option>Erst Objekt anlegen</option>'}</select></div>

    </div>
    <div class="field-row">
      <div class="field"><label>Leistungszeitraum von</label><input id="f-r-von" type="date" value="${r.leistungszeitraum_von||''}"></div>
      <div class="field"><label>Leistungszeitraum bis</label><input id="f-r-bis" type="date" value="${r.leistungszeitraum_bis||''}"></div>
    </div>
    <div class="helptext" style="margin-top:-8px;margin-bottom:14px;">Wichtig für die Abrechnung: nicht das Rechnungsdatum, sondern der Zeitraum, für den die Leistung erbracht wurde (z.B. Heizöl-Lieferung für 2025 auch wenn im Januar 2026 bezahlt).</div>
    <div class="field"><label>Aussteller / Lieferant</label><input id="f-r-aussteller" value="${esc(r.aussteller || (z?z.absender:''))}"></div>
    <div class="field">
      <label>Umlagefähig auf Mieter?</label>
      <select id="f-r-umlage">
        <option value="ja" ${r.umlagefaehig!==false?'selected':''}>Ja – gehört in die Nebenkostenabrechnung</option>

  openModal(id?'Ausgabe bearbeiten':'Ausgabe erfassen', body, foot);
}
function openRechnungFormAusZahlung(zahlungId){ openRechnungForm(null, zahlungId); }
async function saveRechnung(id, zahlungId){
  const obj = {
    objekt_id: document.getElementById('f-r-objekt').value,
    kostenart_id: document.getElementById('f-r-ka').value,
    rechnungsdatum: document.getElementById('f-r-datum').value,
    betrag: Number(document.getElementById('f-r-betrag').value)||0,
    leistungszeitraum_von: document.getElementById('f-r-von').value || null,
    leistungszeitraum_bis: document.getElementById('f-r-bis').value || null,
    aussteller: document.getElementById('f-r-aussteller').value.trim(),
    umlagefaehig: document.getElementById('f-r-umlage').value==='ja',
    notizen: document.getElementById('f-r-notiz').value.trim(),
  };
  if(!obj.objekt_id || !obj.kostenart_id || !obj.rechnungsdatum){ showToast('Bitte Objekt, Kostenart und Datum angeben', true); return; }
  if(!obj.leistungszeitraum_von || !obj.leistungszeitraum_bis){ showToast('Bitte Leistungszeitraum angeben – sonst kann die Abrechnung diese Ausgabe nicht finden', true); return; }
  let rechnung;
  if(id){ await dbUpdate('rechnungen', id, obj); rechnung = STATE.rechnungen.find(x=>x.id===id); Object.assign(rechnung, obj); }
  else{ rechnung = await dbInsert('rechnungen', obj); STATE.rechnungen.push(rechnung); }
  if(zahlungId){
    await dbUpdate('zahlungen', zahlungId, {rechnung_id:rechnung.id, status:'zugeordnet'});
    const z = STATE.zahlungen.find(x=>x.id===zahlungId);
    if(z){ z.rechnung_id = rechnung.id; z.status='zugeordnet'; }
  }
  closeModal(); showToast('Ausgabe gespeichert'); renderPage();
}
async function unassignAusgabe(id){
  await dbUpdate('zahlungen', id, {rechnung_id:null, status:'offen'});
  const z = STATE.zahlungen.find(x=>x.id===id);
  z.rechnung_id = null; z.status='offen';
  showToast('Zuordnung gelöst'); renderPage();
}

function renderAbrechnungDetail(id){
  const a = STATE.abrechnungen.find(x=>x.id===id);
  if(!a){ STATE.selectedAbrechnungId=null; return renderNebenkosten(); }
  const details = STATE.abrechnungDetails.filter(d=>d.abrechnung_id===id);
  const vertragIds = [...new Set(details.map(d=>d.vertrag_id))];

  // Prüfsumme je Kostenart: Summe der Rechnungen muss der Summe der verteilten Beträge entsprechen
  const kostenartenInAbrechnung = [...new Set(details.filter(d=>!d.ist_vorauszahlung).map(d=>d.kostenart_id))];
  const pruefsummen = kostenartenInAbrechnung.map(kaId=>{
    const ka = STATE.kostenarten.find(k=>k.id===kaId);
    const rechnungssumme = STATE.rechnungen.filter(r=>r.objekt_id===a.objekt_id && r.kostenart_id===kaId && r.umlagefaehig!==false &&
      r.leistungszeitraum_von && r.leistungszeitraum_bis && r.leistungszeitraum_von<=a.zeitraum_bis && r.leistungszeitraum_bis>=a.zeitraum_von)
      .reduce((s,r)=>s+Number(r.betrag||0),0);
    const verteiltsumme = details.filter(d=>d.kostenart_id===kaId && !d.ist_vorauszahlung).reduce((s,d)=>s+Number(d.betrag||0),0);
    return {name: ka?.name||'?', rechnungssumme, verteiltsumme, diff: round2(rechnungssumme-verteiltsumme)};
  });
  const hatAbweichung = pruefsummen.some(p=>Math.abs(p.diff)>0.05);

  return `
  <div class="breadcrumb"><span onclick="STATE.selectedAbrechnungId=null; renderPage();">← Alle Abrechnungen</span></div>
  <div class="pagehead">
    <div><h1>${esc(objektName(a.objekt_id))}</h1><div class="desc">Abrechnungszeitraum ${fmtDate(a.zeitraum_von)} – ${fmtDate(a.zeitraum_bis)}</div></div>

    </div>
  </div>
  <div class="card card-pad" style="margin-bottom:20px;${hatAbweichung?'background:var(--danger-dim);':'background:var(--success-dim);'}">
    <b>Prüfsumme: ${hatAbweichung? '⚠ Abweichung gefunden' : '✓ Stimmt überein'}</b>
    <table style="margin-top:10px;"><thead><tr><th>Kostenart</th><th>Summe Rechnungen</th><th>Summe an Mieter verteilt</th><th>Differenz</th></tr></thead>
    <tbody>
    ${pruefsummen.map(p=>`<tr><td>${esc(p.name)}</td><td>${fmtMoney(p.rechnungssumme)}</td><td>${fmtMoney(p.verteiltsumme)}</td><td style="${Math.abs(p.diff)>0.05?'color:var(--danger);font-weight:600;':''}">${fmtMoney(p.diff)}</td></tr>`).join('')}
    </tbody></table>
    ${hatAbweichung? `<div class="helptext" style="margin-top:8px;">Eine Abweichung kann bedeuten: nach der Berechnung wurde ein Betrag manuell verändert, oder eine Rechnung wurde nachträglich hinzugefügt/gelöscht. Prüfe die betroffene Kostenart.</div>`:''}
  </div>
  ${(a.warnungen && a.warnungen.length)? `
  <div class="card card-pad" style="margin-bottom:20px;background:var(--warn-dim);">
    <b>⚠ Prüfhinweise (${a.warnungen.length})</b>
    <div class="helptext" style="margin-bottom:8px;">Diese Abrechnung wurde trotzdem erstellt – prüfe die folgenden Punkte, bevor du sie versendest:</div>
    ${a.warnungen.map(w=>`<div style="padding:6px 0;border-top:1px solid rgba(0,0,0,0.06);font-size:13px;">${esc(w)}</div>`).join('')}
  </div>`:''}
  ${vertragIds.map(vid=>{
    const v = STATE.vertraege.find(x=>x.id===vid);
    const rows = details.filter(d=>d.vertrag_id===vid);
    const kostenRows = rows.filter(r=>!r.ist_vorauszahlung);
    const vzRows = rows.filter(r=>r.ist_vorauszahlung);
    const summeKosten = kostenRows.reduce((s,r)=>s+Number(r.betrag),0);

function handleCsvUpload(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    const text = e.target.result;
    const delim = text.includes(';') ? ';' : ',';
    const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
    const headers = lines[0].split(delim).map(h=>h.trim().replace(/^"|"$/g,''));
    const rows = lines.slice(1).map(l=>{
      const cells = l.split(delim).map(c=>c.trim().replace(/^"|"$/g,''));
      const obj = {};
      headers.forEach((h,i)=> obj[h]=cells[i]);
      return obj;
    });
    STATE.csvRows = rows;
    openCsvMappingModal(headers);
  };
  reader.readAsText(file, 'UTF-8');
  evt.target.value = '';
}

function openCsvMappingModal(headers){
  const opts = headers.map(h=>`<option value="${esc(h)}">${esc(h)}</option>`).join('');
  const body = `
    <div class="helptext" style="margin-bottom:14px;">${STATE.csvRows.length} Zeilen erkannt. Ordne die Spalten deines Kontoauszugs zu:</div>
    <div class="field"><label>Datum-Spalte</label><select id="map-datum">${opts}</select></div>
    <div class="field"><label>Betrag-Spalte</label><select id="map-betrag">${opts}</select></div>
    <div class="field"><label>Verwendungszweck-Spalte</label><select id="map-zweck">${opts}</select></div>
    <div class="field"><label>Absender/Auftraggeber-Spalte (optional)</label><select id="map-absender"><option value="">– keine –</option>${opts}</select></div>
  `;
  const foot = `<button class="btn-outline" onclick="closeModal()">Abbrechen</button><button class="btn-primary" onclick="importCsv()">Importieren</button>`;
  openModal('Spalten zuordnen', body, foot);
}

async function importCsv(){
  const dCol = document.getElementById('map-datum').value;
  const bCol = document.getElementById('map-betrag').value;
  const zCol = document.getElementById('map-zweck').value;
  const aCol = document.getElementById('map-absender').value;

  let importedEin = 0, matchedEin = 0, importedAus = 0, matchedAus = 0;
  for(const row of STATE.csvRows){
    let datum = parseGermanDate(row[dCol]);
    let betrag = parseGermanNumber(row[bCol]);
    if(!datum || isNaN(betrag) || betrag===0) continue;
    const zweck = row[zCol]||'';
    const absender = aCol? (row[aCol]||'') : '';

    if(betrag>0){
      // Eingang: gegen aktive Mietverträge abgleichen
      let matchVertrag = null;
      for(const v of aktiveVertraege()){
        const m = STATE.mieter.find(x=>x.id===v.mieter_id);
        const nn = (m?.nachname||'').toLowerCase();
        const firma = (m?.firma||'').toLowerCase();
        const haystack = (zweck+' '+absender).toLowerCase();
        const soll = Number(v.kaltmiete||0)+Number(v.nk_vorauszahlung||0);
        const nameMatch = (nn && nn.length>2 && haystack.includes(nn)) || (firma && firma.length>2 && haystack.includes(firma));
        const betragMatch = Math.abs(betrag - soll) < 0.01;
        if(nameMatch && betragMatch){ matchVertrag = v; break; }
      }
      const saved = await dbInsert('zahlungen', {datum, betrag, verwendungszweck:zweck, absender,
        vertrag_id: matchVertrag? matchVertrag.id : null, rechnung_id:null,
        status: matchVertrag? 'zugeordnet' : 'offen'});
      STATE.zahlungen.unshift(saved);
      importedEin++;
      if(matchVertrag) matchedEin++;
    } else {
      // Ausgabe: gegen erfasste Rechnungen abgleichen (Betrag + Aussteller/Verwendungszweck + Datumsnähe)
      const betragAbs = Math.abs(betrag);
      const haystack = (zweck+' '+absender).toLowerCase();
      let matchRechnung = null;
      for(const r of STATE.rechnungen){
        if(Math.abs(Number(r.betrag||0) - betragAbs) > 0.01) continue;
        const ausstellerName = (r.aussteller||'').toLowerCase();
        const nameMatch = ausstellerName && ausstellerName.length>2 && haystack.includes(ausstellerName);
        const tageDiff = r.rechnungsdatum? Math.abs((new Date(datum)-new Date(r.rechnungsdatum))/86400000) : 999;
        if(nameMatch || tageDiff<=14){ matchRechnung = r; break; }
      }
      const saved = await dbInsert('zahlungen', {datum, betrag, verwendungszweck:zweck, absender,
        vertrag_id:null, rechnung_id: matchRechnung? matchRechnung.id : null,
        status: matchRechnung? 'zugeordnet' : 'offen'});
      STATE.zahlungen.unshift(saved);
      importedAus++;
      if(matchRechnung) matchedAus++;
    }
  }
  closeModal();
  showToast(`${importedEin} Einnahmen (${matchedEin} zugeordnet), ${importedAus} Ausgaben (${matchedAus} zu Rechnungen zugeordnet)`);
  renderPage();
}

function parseGermanDate(s){
  if(!s) return null;
  s = s.trim();
  let m = s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if(m) return `${m[3]}-${m[2]}-${m[1]}`;
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  return null;
}
function parseGermanNumber(s){
  if(s==null) return NaN;
  s = String(s).trim().replace(/\./g,'').replace(',','.');
  return parseFloat(s);
}

async function assignZahlung(id, vertragId){
  if(!vertragId) return;
  await dbUpdate('zahlungen', id, {vertrag_id:vertragId, status:'zugeordnet'});
  const z = STATE.zahlungen.find(x=>x.id===id);
  z.vertrag_id = vertragId; z.status='zugeordnet';
  showToast('Zahlung zugeordnet'); renderPage();
}
async function unassignZahlung(id){
  await dbUpdate('zahlungen', id, {vertrag_id:null, status:'offen'});
  const z = STATE.zahlungen.find(x=>x.id===id);
  z.vertrag_id = null; z.status='offen';
  showToast('Zuordnung gelöst'); renderPage();
}
async function ignoreZahlung(id){
  await dbUpdate('zahlungen', id, {status:'ignoriert'});
  STATE.zahlungen.find(x=>x.id===id).status = 'ignoriert';
  showToast('Zahlung ignoriert'); renderPage();
}
async function unignoreZahlung(id){
  await dbUpdate('zahlungen', id, {status:'offen'});
  STATE.zahlungen.find(x=>x.id===id).status = 'offen';
  showToast('Zahlung zurückgeholt'); renderPage();
}
