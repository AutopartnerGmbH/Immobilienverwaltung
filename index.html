function renderDokumente(){
  const filterObjekt = STATE.dokumenteObjektFilter;
  const liste = filterObjekt? STATE.dokumente.filter(d=>d.objekt_id===filterObjekt) : STATE.dokumente;
  const objektOpts = STATE.objekte.map(o=>`<option value="${o.id}">${esc(o.name)}</option>`).join('');

  return `
  <div class="pagehead">
    <div><h1>Dokumente</h1><div class="desc">Verträge, Rechnungen, Protokolle und Korrespondenz zentral ablegen</div></div>
  </div>

  <div class="card card-pad" style="margin-bottom:22px;">
    <div class="field-row-3">
      <div class="field"><label>Objekt (optional)</label><select id="f-dok-objekt-target"><option value="">– kein Objekt –</option>${objektOpts}</select></div>
      <div class="field"><label>Kategorie</label><select id="f-dok-kategorie-target">${DOK_KATEGORIEN.map(k=>`<option>${k}</option>`).join('')}</select></div>
      <div class="field"><label>Notiz (optional)</label><input id="f-dok-notiz-target" placeholder="z.B. Betriebskostenrechnung 2025"></div>
    </div>
    <label for="dok-file-input" class="dropzone" style="display:block;">📎 Dateien hierher ziehen oder klicken zum Hochladen</label>
    <input id="dok-file-input" type="file" multiple style="display:none;" onchange="handleDokumentUpload(event)">
  </div>

  <div class="subnav">
    <button class="${!filterObjekt?'active':''}" onclick="STATE.dokumenteObjektFilter=''; renderPage();">Alle Objekte</button>
    ${STATE.objekte.map(o=>`<button class="${filterObjekt===o.id?'active':''}" onclick="STATE.dokumenteObjektFilter='${o.id}'; renderPage();">${esc(o.name)}</button>`).join('')}
  </div>

  <div class="card">
    ${liste.length===0? `<div class="empty">Noch keine Dokumente hochgeladen</div>` :
      liste.map(d=>`
      <div class="doc-row">
        <div>
          <b>${esc(d.dateiname)}</b>
          <div class="helptext">${esc(d.kategorie||'')} ${d.objekt_id? ' · '+esc(objektName(d.objekt_id)) : ''} ${d.notizen? ' · '+esc(d.notizen):''} · ${fmtDate((d.hochgeladen_am||'').slice(0,10))}</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn-ghost btn-sm" onclick="downloadDokument('${d.storage_path}')">Öffnen</button>
          <button class="btn-danger btn-sm" onclick="deleteDokument('${d.id}','${d.storage_path}')">Löschen</button>
        </div>
      </div>`).join('')}
  </div>`;
}

async function handleDokumentUpload(evt){
  const files = evt.target.files;
  if(!files.length) return;
  const objektId = document.getElementById('f-dok-objekt-target').value || null;
  const kategorie = document.getElementById('f-dok-kategorie-target').value;
  const notiz = document.getElementById('f-dok-notiz-target').value.trim();

  let ok=0, fail=0;
  for(const file of files){
    const path = `${objektId||'allgemein'}/${Date.now()}_${file.name}`;
    const {error} = await sb.storage.from('dokumente').upload(path, file);
    if(error){ fail++; continue; }
    const row = await dbInsert('dokumente', {objekt_id:objektId, kategorie, dateiname:file.name, storage_path:path, notizen:notiz});
    STATE.dokumente.unshift(row);
    ok++;
  }
  evt.target.value = '';
  showToast(`${ok} Datei(en) hochgeladen${fail?`, ${fail} fehlgeschlagen`:''}`, fail>0 && ok===0);
  renderPage();
}

async function downloadDokument(path){
  const {data, error} = await sb.storage.from('dokumente').createSignedUrl(path, 120);
  if(error){ showToast('Datei konnte nicht geöffnet werden: '+error.message, true); return; }
  window.open(data.signedUrl, '_blank');
}
async function deleteDokument(id, path){
  if(!confirm('Dokument wirklich löschen?')) return;
  await sb.storage.from('dokumente').remove([path]);
  await dbDelete('dokumente', id);
  STATE.dokumente = STATE.dokumente.filter(x=>x.id!==id);
  showToast('Dokument gelöscht'); renderPage();
}

/* ============================================================
   BERICHTE
   ============================================================ */
function renderBerichte(){
  const jahr = new Date().getFullYear();
  const rows = STATE.objekte.map(o=>{
    const eh = STATE.einheiten.filter(e=>e.objekt_id===o.id);
    const aktive = eh.map(e=>vertragFuerEinheit(e.id)).filter(Boolean);
    const sollJahr = aktive.reduce((s,v)=>s+Number(v.kaltmiete||0)*12,0);
    return {o, anzahlEinheiten:eh.length, vermietet:aktive.length, leer:eh.length-aktive.length, sollJahr};
  });
  const gesamtSoll = rows.reduce((s,r)=>s+r.sollJahr,0);
  const in12 = new Date(); in12.setFullYear(in12.getFullYear()+1);
  const auslaufend = STATE.vertraege.filter(v=>v.status==='aktiv' && v.ende_datum && new Date(v.ende_datum)<=in12)
    .sort((a,b)=>a.ende_datum.localeCompare(b.ende_datum));

  return `
  <div class="pagehead"><div><h1>Berichte</h1><div class="desc">Kennzahlen und Übersichten, Stand ${jahr}</div></div></div>

  <div class="section-title">Jahres-Soll-Mieteinnahmen je Objekt</div>
  <div class="card" style="margin-bottom:24px;">
    <table>
      <thead><tr><th>Objekt</th><th>Einheiten</th><th>Vermietet</th><th>Leerstand</th><th>Soll-Kaltmiete p.a.</th></tr></thead>
      <tbody>
      ${rows.length===0? `<tr><td colspan="5" class="empty">Noch keine Objekte</td></tr>` :
        rows.map(r=>`<tr class="rowhover">
          <td><b>${esc(r.o.name)}</b></td><td>${r.anzahlEinheiten}</td><td>${r.vermietet}</td>
          <td>${r.leer>0?`<span class="badge badge-warn">${r.leer}</span>`:'0'}</td>
          <td>${fmtMoney(r.sollJahr)}</td>
        </tr>`).join('')}
      </tbody>
      ${rows.length? `<tfoot><tr><td colspan="4" style="text-align:right;font-weight:600;padding:12px 14px;">Gesamt</td><td style="font-weight:600;padding:12px 14px;">${fmtMoney(gesamtSoll)}</td></tr></tfoot>`:''}
    </table>
  </div>

  <div class="section-title">Vertragsenden – nächste 12 Monate</div>
  <div class="card">
    <table>
      <thead><tr><th>Mieter</th><th>Einheit</th><th>Vertragsende</th></tr></thead>
      <tbody>
      ${auslaufend.length===0? `<tr><td colspan="3" class="empty">Keine Vertragsenden in den nächsten 12 Monaten</td></tr>` :
        auslaufend.map(v=>`<tr class="rowhover">
          <td>${esc(mieterName(v.mieter_id))}</td><td>${esc(einheitLabel(v.einheit_id))}</td><td>${fmtDate(v.ende_datum)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}
